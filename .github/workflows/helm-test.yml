name: Helm Test

on:
  push:
    branches: [ main ]
    paths:
      - 'helm/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'helm/**'

jobs:
  helm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm lint
        run: helm lint helm/memory-server/

      - name: Helm template dry-run
        run: helm template memory-server helm/memory-server/ --debug
