apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "memory-server.fullname" . }}
  labels:
    {{- include "memory-server.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "memory-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "memory-server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "memory-server.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: PORT
              value: "8080"
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            {{- if .Values.bedrock.region }}
            - name: BEDROCK_REGION
              value: {{ .Values.bedrock.region | quote }}
            {{- end }}
            - name: DYNAMODB_TABLE_NAME
              value: {{ .Values.dynamodb.tableName | quote }}
            - name: S3_VECTORS_BUCKET_NAME
              value: {{ .Values.s3vectors.bucketName | quote }}
            - name: S3_VECTORS_INDEX_NAME
              value: {{ .Values.s3vectors.indexName | quote }}
            - name: DECAY_LAMBDA
              value: {{ .Values.decay.lambda | quote }}
            - name: DECAY_MU
              value: {{ .Values.decay.mu | quote }}
            {{- if .Values.auth.adminToken }}
            - name: ADMIN_TOKEN
              value: {{ .Values.auth.adminToken | quote }}
            {{- end }}
            {{- if .Values.auth.authEnabled }}
            - name: AUTH_ENABLED
              value: "true"
            {{- end }}
            {{- if or .Values.aws.accessKeyId .Values.existingSecret }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "memory-server.awsSecretName" . }}
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "memory-server.awsSecretName" . }}
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
