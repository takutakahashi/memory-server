{{- if and .Values.frontend.enabled .Values.frontend.apiToken (not .Values.frontend.apiTokenSecretName) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memory-server.fullname" . }}-frontend-token
  labels:
    {{- include "memory-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
type: Opaque
data:
  api-token: {{ .Values.frontend.apiToken | b64enc | quote }}
{{- end }}
