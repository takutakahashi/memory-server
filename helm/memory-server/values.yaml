replicaCount: 1

image:
  repository: ghcr.io/takutakahashi/memory-server
  pullPolicy: IfNotPresent
  tag: ""  # defaults to .Chart.AppVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
    external-dns.alpha.kubernetes.io/hostname: "memory.in.takutakahashi.dev"
  hosts:
    - host: memory.in.takutakahashi.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: memory-server-tls
      hosts:
        - memory.in.takutakahashi.dev

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# AWS configuration
aws:
  region: "ap-northeast-1"
  # If using IAM role (recommended), leave accessKeyId and secretAccessKey empty
  # and annotate the ServiceAccount with the IAM role ARN
  accessKeyId: ""
  secretAccessKey: ""
  # IAM role ARN for IRSA (EKS IAM Roles for Service Accounts)
  irsaRoleArn: ""

# DynamoDB configuration
dynamodb:
  tableName: "memories"

# S3 Vectors configuration
s3vectors:
  bucketName: ""
  indexName: "memories"

# Bedrock configuration
bedrock:
  region: ""  # defaults to aws.region if empty

# Memory decay parameters
decay:
  lambda: "0.01"
  mu: "0.005"

# Existing secret for AWS credentials (alternative to aws.accessKeyId/secretAccessKey)
existingSecret: ""

# Auth configuration
auth:
  # Admin token — grants super-user access to both the user management API
  # and the memory API (as the "admin" user).
  adminToken: ""

# Curator configuration
# The curator agent uses the Anthropic API (via claude-agent-sdk) to
# autonomously process pending Inbox entries into Memories and KB pages.
curator:
  # Name of an existing Secret to mount via envFrom.
  # All keys in the secret are exposed as environment variables to the server
  # and inherited by the curator subprocess (bun run scripts/curator_agent.ts).
  # Recommended keys:
  #   CLAUDE_CODE_OAUTH_TOKEN  – OAuth token for the claude-agent-sdk
  #   CURATOR_TOKEN            – Bearer token for MCP endpoint auth
  secretName: ""

  # MCP endpoint URL the curator agent connects to (default: in-cluster service).
  mcpUrl: ""

  # user_id the curator agent operates as.
  userId: "default"

# Frontend (社内 Wiki ポータル) configuration
frontend:
  enabled: true

  replicaCount: 1

  image:
    repository: ghcr.io/takutakahashi/memory-server-frontend
    pullPolicy: IfNotPresent
    tag: ""  # defaults to .Chart.AppVersion

  # URL of the memory-server backend API (seen from the browser)
  apiBaseUrl: ""

  # Default user_id passed to the KB API
  defaultUserId: "default"

  # Name of an existing Secret that contains the API Bearer token.
  # The secret must have a key matching apiTokenSecretKey (default: "api-token").
  apiTokenSecretName: ""
  apiTokenSecretKey: "api-token"

  podAnnotations: {}
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1001
    capabilities:
      drop:
        - ALL

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt"
    hosts:
      - host: ""  # Set your domain here, e.g. wiki.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []  # e.g. [{secretName: my-tls, hosts: [wiki.example.com]}]

  podSecurityContext:
    runAsNonRoot: true
    fsGroup: 1001

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
